    <style>
.form-control {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: none;
    border-radius: 10px;
    background-color: rgba(255, 255, 255, 0.1);
    color: white;
    backdrop-filter: blur(10px);
}

.form-control::placeholder {
    color: white;
    opacity: 1;
}

.form-control {
    color: white;
    background-color: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: none;
}

.contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    margin-top: 2rem;
}

.contact-form, .contact-info {
    background: rgba(255, 255, 255, 0.05);
    padding: 2rem;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    color: #fff;
}

.contact-form input,
.contact-form textarea {
    width: 100%;
    padding: 0.75rem;
    margin-top: 0.25rem;
    margin-bottom: 1rem;
    border: none;
    border-radius: 8px;
    background-color: rgba(255, 255, 255, 0.1);
    color: #fff;
}

.cta-button {
    display: inline-block;
    padding: 0.75rem 2rem;
    background-color: #007bff;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    transition: 0.3s ease;
}

.cta-button:hover {
    background-color: #0056b3;
}


body {
      margin: 0;
      padding: 50px 20px;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: white;
    }

    .timeline {
      position: relative;
      max-width: 1100px;
      margin: auto;
      padding: 40px 0;
    }

    /* Center vertical line */
    .timeline::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 4px;
      background-color: rgba(255, 255, 255, 0.3);
      transform: translateX(-50%);
    }

    .timeline-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      margin: 60px 0;
    }

    .timeline-box {
      width: 45%;
      padding: 20px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    .timeline-dot {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      background-color: #0d6efd;
      border: 3px solid #fff;
      border-radius: 50%;
      z-index: 2;
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .timeline-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .timeline-box {
        width: 100%;
        margin-bottom: 30px;
      }

      .timeline-dot {
        display: none;
      }

      .timeline::before {
        left: 10px;
      }
    }

</style>

</head>
<body>

    function showPage(pageId)
